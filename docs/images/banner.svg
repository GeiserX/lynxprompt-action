<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/><line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/><line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/><line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- GitHub Actions icon: circle with play/bolt -->
  <g transform="translate(70, 50)">
    <circle cx="40" cy="40" r="35" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <!-- Lightning bolt (actions) -->
    <polygon points="45,18 30,45 38,45 35,62 50,35 42,35" fill="#ffffff" opacity="0.6"/>
  </g>

  <text x="195" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff" letter-spacing="-1">
    LynxPrompt Action
  </text>

  <text x="197" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    GitHub Action to sync and validate AI config files
  </text>

  <g transform="translate(745, 42)" opacity="0.15">
    <text x="0" y="0" font-family="monospace" font-size="11" fill="#ffffff">- uses:</text>
    <text x="0" y="16" font-family="monospace" font-size="11" fill="#ffffff">    lynxprompt</text>
    <text x="0" y="32" font-family="monospace" font-size="11" fill="#ffffff">  with:</text>
    <text x="0" y="48" font-family="monospace" font-size="11" fill="#ffffff">    mode: sync</text>
    <text x="0" y="64" font-family="monospace" font-size="11" fill="#ffffff">    validate: true</text>
    <text x="0" y="80" font-family="monospace" font-size="11" fill="#ffffff">    diff: true</text>
  </g>
</svg>
